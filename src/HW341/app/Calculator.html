<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Інтерактивний калькулятор</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f2f4f7;
        }

        .calculator {
            width: 320px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            padding: 20px;
        }

        .display {
            width: 100%;
            height: 70px;
            border: none;
            border-radius: 10px;
            background: #f7f7f7;
            text-align: right;
            font-size: 28px;
            padding: 15px;
            margin-bottom: 15px;
            color: #222;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            height: 60px;
            border: none;
            border-radius: 10px;
            font-size: 22px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .number {
            background: #e9edf3;
        }

        .operator {
            background: #ffd166;
        }

        .action {
            background: #ef476f;
            color: white;
        }

        .equal {
            background: #06d6a0;
            color: white;
        }

        .zero {
            grid-column: span 2;
        }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" class="display" id="display" value="" readonly>

    <div class="buttons">
        <button class="action" onclick="clearDisplay()">C</button>
        <button class="action" onclick="backspace()">⌫</button>
        <button class="operator" onclick="appendValue('%')">%</button>
        <button class="operator" onclick="appendValue('/')">÷</button>

        <button class="number" onclick="appendValue('7')">7</button>
        <button class="number" onclick="appendValue('8')">8</button>
        <button class="number" onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('*')">×</button>

        <button class="number" onclick="appendValue('4')">4</button>
        <button class="number" onclick="appendValue('5')">5</button>
        <button class="number" onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendValue('-')">−</button>

        <button class="number" onclick="appendValue('1')">1</button>
        <button class="number" onclick="appendValue('2')">2</button>
        <button class="number" onclick="appendValue('3')">3</button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button class="number zero" onclick="appendValue('0')">0</button>
        <button class="number" onclick="appendValue('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
    const display = document.getElementById("display");

    function appendValue(value) {
        const lastChar = display.value.slice(-1);
        const operators = ['+', '-', '*', '/', '%'];

        if (operators.includes(value)) {
            if (display.value === '') {
                return;
            }

            if (operators.includes(lastChar)) {
                display.value = display.value.slice(0, -1) + value;
                return;
            }
        }

        if (value === '.') {
            const parts = display.value.split(/[\+\-\*\/%]/);
            const currentPart = parts[parts.length - 1];
            if (currentPart.includes('.')) {
                return;
            }
        }

        display.value += value;
    }

    function clearDisplay() {
        display.value = '';
    }

    function backspace() {
        display.value = display.value.slice(0, -1);
    }

    function calculate() {
        try {
            if (display.value.trim() === '') {
                return;
            }

            if (/\/0(?!\d)/.test(display.value)) {
                display.value = 'Помилка';
                return;
            }

            let result = eval(display.value);

            if (!isFinite(result)) {
                display.value = 'Помилка';
                return;
            }

            display.value = result;
        } catch (error) {
            display.value = 'Помилка';
        }
    }

    document.addEventListener("keydown", function (event) {
        const allowedKeys = "0123456789+-*/.%";

        if (allowedKeys.includes(event.key)) {
            appendValue(event.key);
        } else if (event.key === "Enter") {
            calculate();
        } else if (event.key === "Backspace") {
            backspace();
        } else if (event.key === "Escape") {
            clearDisplay();
        }
    });
</script>

</body>
</html>
